name: Monthly Model Retrain

on:
  schedule:
    # Chạy vào 02:00 UTC (khoảng 9h sáng giờ VN) vào ngày 1 hàng tháng
    - cron: '0 2 1 * *'
  workflow_dispatch: # Cho phép bấm chạy bằng tay trên Github

jobs:
  retrain-model:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy xgboost yfinance requests python-dotenv scikit-learn entsoe-py

    - name: Retrain Model (Monthly)
      run: |
        python web_app/ai_model/train_daily.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add web_app/ai_model/daily_xgb.json web_app/ai_model/training_report.json
        # Bỏ qua lỗi nếu không có gì thay đổi
        git commit -m "Automated monthly model retrain [skip ci]" || echo "No changes to commit"
        git push
